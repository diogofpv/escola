<style>
  :root{
    --navy:#1B2A44;
    --navy-2:#243652;
    --green:#3D6B5C;
    --green-2:#2E5044;
    --paper:#F7F4EA;
    --paper-2:#EFEADA;
    --ink:#262420;
    --ink-soft:#5B564C;
    --gold:#B98A1E;
    --red:#AB4430;
    --line:#DAD3C0;
    --white:#FFFDF8;
    --serif: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, 'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--sans);color:var(--ink);background:var(--paper);}
  #app{min-height:100%;}
  .topbar{
    background:var(--navy);color:var(--white);
    padding:14px 22px;display:flex;align-items:center;justify-content:space-between;
    font-family:var(--serif);
  }
  .topbar .brand{display:flex;align-items:baseline;gap:10px;}
  .topbar .brand b{font-size:19px;letter-spacing:.3px;}
  .topbar .brand span{font-size:12px;color:#C9D2DE;font-family:var(--sans);}
  .topbar .who{font-family:var(--sans);font-size:13px;display:flex;align-items:center;gap:14px;}
  .btn-link{background:none;border:none;color:#D8DEE8;text-decoration:underline;cursor:pointer;font-size:13px;font-family:var(--sans);padding:0;}
  .wrap{max-width:980px;margin:0 auto;padding:28px 22px 60px;}
  h1,h2,h3{font-family:var(--serif);font-weight:normal;margin:0 0 6px;}
  h1{font-size:26px;color:var(--navy);}
  h2{font-size:20px;color:var(--navy);}
  h3{font-size:16px;color:var(--navy-2);}
  .sub{color:var(--ink-soft);font-size:13px;margin:0 0 20px;}
  .card{
    background:var(--white);border:1px solid var(--line);border-radius:3px;
    padding:22px;margin-bottom:18px;
  }
  .ruled{
    background-image: repeating-linear-gradient(to bottom, transparent 0, transparent 30px, var(--line) 31px);
  }
  label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
  input[type=text],input[type=password],input[type=date],input[type=number],select,textarea{
    width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:2px;
    background:var(--paper);font-family:var(--sans);font-size:14px;color:var(--ink);
  }
  input[type=number]{font-family:var(--mono);width:64px;text-align:center;padding:6px;}
  textarea{resize:vertical;min-height:70px;}
  .field{margin-bottom:14px;}
  .row{display:flex;gap:14px;flex-wrap:wrap;}
  .row > .field{flex:1;min-width:160px;}
  button.primary{
    background:var(--green);color:var(--white);border:none;border-radius:2px;
    padding:10px 18px;font-size:14px;cursor:pointer;font-family:var(--sans);
  }
  button.primary:hover{background:var(--green-2);}
  button.ghost{
    background:none;border:1px solid var(--navy);color:var(--navy);border-radius:2px;
    padding:9px 16px;font-size:13px;cursor:pointer;
  }
  button.ghost:hover{background:var(--navy);color:var(--white);}
  button.danger{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;line-height:1;}
  .stamp{
    display:inline-block;border:1.5px dashed currentColor;border-radius:50%;
    padding:6px 12px;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;
    transform:rotate(-3deg);font-family:var(--sans);font-weight:600;
  }
  .stamp.green{color:var(--green-2);}
  .stamp.gold{color:var(--gold);}
  .stamp.navy{color:var(--navy);}
  .stamp.red{color:var(--red);}
  .badges{display:flex;gap:10px;margin:8px 0 18px;flex-wrap:wrap;}
  .tabs{display:flex;gap:2px;border-bottom:2px solid var(--navy);margin-bottom:20px;flex-wrap:wrap;}
  .tab{
    padding:9px 16px;cursor:pointer;font-size:13px;color:var(--ink-soft);
    border:1px solid transparent;border-bottom:none;background:none;font-family:var(--sans);
  }
  .tab.active{color:var(--navy);background:var(--white);border-color:var(--line);font-weight:600;
    border-radius:3px 3px 0 0;margin-bottom:-2px;border-bottom:2px solid var(--white);}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{
    text-align:left;font-family:var(--sans);font-size:11px;text-transform:uppercase;letter-spacing:.4px;
    color:var(--ink-soft);border-bottom:2px solid var(--navy);padding:8px 6px;
  }
  td{padding:7px 6px;border-bottom:1px solid var(--line);}
  tr:hover td{background:var(--paper-2);}
  .list-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 14px;border:1px solid var(--line);border-radius:3px;margin-bottom:8px;background:var(--white);
    cursor:pointer;
  }
  .list-item:hover{border-color:var(--green);}
  .list-item .meta{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .empty{color:var(--ink-soft);font-size:13px;font-style:italic;padding:20px 0;text-align:center;}
  .error{color:var(--red);font-size:13px;margin:10px 0;}
  .ok{color:var(--green-2);font-size:13px;margin:10px 0;}
  .locked{
    padding:16px;border:1px dashed var(--line);border-radius:3px;color:var(--ink-soft);
    font-size:13px;text-align:center;background:var(--paper-2);
  }
  .checkline{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;border-bottom:1px solid var(--line);}
  .checkline label{margin:0;text-transform:none;font-size:14px;color:var(--ink);}
  .presenca{display:flex;align-items:center;gap:8px;font-size:12px;}
  .presenca input{width:auto;}
  .num-final{font-family:var(--mono);font-weight:600;}
  .final-alta{color:var(--green-2);}
  .final-baixa{color:var(--red);}
  .link-small{color:var(--navy);text-decoration:underline;cursor:pointer;font-size:12px;background:none;border:none;font-family:var(--sans);}
  .toggle-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;}
  .segbtn{padding:7px 14px;border:1px solid var(--navy);background:var(--white);color:var(--navy);cursor:pointer;font-size:12px;}
  .segbtn.on{background:var(--navy);color:var(--white);}
  .loading{padding:60px;text-align:center;color:var(--ink-soft);font-family:var(--serif);font-size:16px;}
  footer.note{font-size:11.5px;color:var(--ink-soft);margin-top:30px;border-top:1px solid var(--line);padding-top:12px;}
  .print-header{display:none;}
  @media print{
    body{background:#fff;}
    .no-print{display:none !important;}
    .wrap{padding:0;max-width:100%;}
    .card{border:none;padding:0;}
    .print-header{
      display:block;margin-bottom:18px;border-bottom:2px solid #000;padding-bottom:10px;
      font-family:var(--serif);
    }
    .print-header .esc{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#444;}
    .print-header h1{font-size:20px;margin:4px 0 2px;color:#000;}
    .print-header .meta{font-size:11px;color:#444;font-family:var(--sans);}
    table{font-size:11px;}
    th{color:#000;border-bottom-color:#000;}
  }
</style>

<!-- ======================================================================
     CONFIGURAÇÃO DO BANCO DE DADOS (Firebase)
     1. Crie um projeto gratuito em https://console.firebase.google.com
     2. Ative o Firestore Database (modo produção) no menu "Build"
     3. Em Configurações do projeto > Seus apps > Web, copie o objeto de
        configuração e cole substituindo o objeto abaixo.
     4. Nas regras do Firestore, cole:
        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {
            match /diario_escolar/{doc=**} { allow read, write: if true; }
          }
        }
     ====================================================================== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "COLE_AQUI",
    authDomain: "COLE_AQUI.firebaseapp.com",
    projectId: "COLE_AQUI",
    storageBucket: "COLE_AQUI.appspot.com",
    messagingSenderId: "COLE_AQUI",
    appId: "COLE_AQUI"
  };

  try{
    const app = initializeApp(firebaseConfig);
    const dbFirestore = getFirestore(app);

    window.__fbGet = async function(key){
      const snap = await getDoc(doc(dbFirestore, 'diario_escolar', key));
      return snap.exists() ? snap.data().value : null;
    };
    window.__fbSet = async function(key, value){
      await setDoc(doc(dbFirestore, 'diario_escolar', key), { value });
    };
    window.__fbReady = true;
    window.dispatchEvent(new Event('firebase-ready'));
  } catch(e){
    window.__fbErro = e.message;
    window.dispatchEvent(new Event('firebase-erro'));
  }
</script>

<script>
const SCHOOL_NAME = 'Colégio Estadual Pandiá Calógeras';
const PERIODOS = {
  bimestre: ['1º Bimestre','2º Bimestre','3º Bimestre','4º Bimestre'],
  trimestre: ['1º Trimestre','2º Trimestre','3º Trimestre']
};

let state = {
  user: null,
  view: 'login',
  authMode: 'entrar',
  turmaAtualId: null,
  abaTurma: 'conteudo',
  dataAula: new Date().toISOString().slice(0,10),
  periodoAula: null,
  editandoAulaId: null,
  periodoAval: null,
  msg: null,
  novaTurmaAberta: false
};

let db = { professores: [], turmas: [] };
let cache = { aulas: {}, notas: {} };

function genId(p){ return p + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

async function sGet(key, shared, fallback){
  try{
    const val = await window.__fbGet(key);
    return (val !== null && val !== undefined) ? val : fallback;
  }
  catch(e){ console.error('erro ao ler dados', e); return fallback; }
}
async function sSet(key, value, shared){
  try{ await window.__fbSet(key, value); return true; }
  catch(e){ console.error('erro ao salvar dados', e); return false; }
}
function waitForFirebase(){
  return new Promise(resolve => {
    if(window.__fbReady) return resolve();
    window.addEventListener('firebase-ready', () => resolve(), { once:true });
    window.addEventListener('firebase-erro', () => resolve(), { once:true });
  });
}

async function init(){
  await waitForFirebase();
  if(window.__fbErro){
    document.getElementById('app').innerHTML = '<div class="loading" style="color:#AB4430;max-width:520px;margin:0 auto;">Não foi possível conectar ao banco de dados (Firebase). Confira se a configuração no início do arquivo (firebaseConfig) foi preenchida corretamente e se as regras do Firestore permitem leitura/escrita.<br><br><span style="font-size:12px;color:#5B564C;">Detalhe técnico: ' + window.__fbErro + '</span></div>';
    return;
  }
  db.professores = await sGet('professores', true, []);
  db.turmas = await sGet('turmas', true, []);
  render();
}

async function loadTurmaData(turmaId){
  if(!cache.aulas[turmaId]) cache.aulas[turmaId] = await sGet('aulas_'+turmaId, true, []);
  if(!cache.notas[turmaId]) cache.notas[turmaId] = await sGet('notas_'+turmaId, true, {});
}

function getTurma(id){ return db.turmas.find(t => t.id === id); }
function isCoordenacao(){ return (state.user.papel||'professor')==='coordenacao'; }
function minhasTurmas(){
  if(isCoordenacao()) return db.turmas.slice();
  return db.turmas.filter(t => t.professorIds.includes(state.user.id));
}
function outrasTurmas(){
  if(isCoordenacao()) return [];
  return db.turmas.filter(t => !t.professorIds.includes(state.user.id));
}

function calcNotaFinal(sistemaNota, av, rec){
  const valores = av.map((v,i) => {
    const o = (v===null||v===undefined||v==='') ? null : parseFloat(v);
    const r = (rec[i]===null||rec[i]===undefined||rec[i]==='') ? null : parseFloat(rec[i]);
    if(o===null && r===null) return null;
    if(o===null) return r;
    if(r===null) return o;
    return Math.max(o,r);
  });
  const preenchidos = valores.filter(v => v!==null && !isNaN(v));
  if(preenchidos.length===0) return null;
  const soma = preenchidos.reduce((a,b)=>a+b,0);
  return sistemaNota==='media' ? soma/preenchidos.length : soma;
}

function fmtNota(n){ return n===null ? '—' : n.toFixed(1); }

// ---------- RENDER ----------
function render(){
  const app = document.getElementById('app');
  if(state.view==='login'){ app.innerHTML = viewLogin(); attachLogin(); return; }

  let top = `<div class="topbar no-print">
    <div class="brand"><b>Diário de Classe</b><span>${SCHOOL_NAME}</span></div>
    <div class="who">${state.user.nome} <span class="stamp ${isCoordenacao()?'gold':'green'}" style="padding:3px 9px;font-size:9px;">${isCoordenacao()?'coordenação':'professor(a)'}</span> <button class="btn-link" onclick="doLogout()">Sair</button></div>
  </div>`;

  let body = '';
  if(state.view==='turmas'){ body = viewTurmas(); }
  else if(state.view==='turma'){ body = viewTurma(); }

  app.innerHTML = top + `<div class="wrap">${body}</div>`;

  if(state.view==='turmas') attachTurmas();
  if(state.view==='turma') attachTurma();
}

// ---------- LOGIN ----------
function viewLogin(){
  return `
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);">
    <div style="width:100%;max-width:380px;">
      <div style="text-align:center;margin-bottom:22px;color:var(--white);">
        <div style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#C9D2DE;">${SCHOOL_NAME}</div>
        <h1 style="color:var(--white);margin-top:12px;">Diário de Classe</h1>
        <p style="color:#C9D2DE;font-size:13px;margin:0;">acesso do professor</p>
      </div>
      <div class="card">
        <div class="toggle-row">
          <button class="segbtn ${state.authMode==='entrar'?'on':''}" onclick="setAuthMode('entrar')">Entrar</button>
          <button class="segbtn ${state.authMode==='criar'?'on':''}" onclick="setAuthMode('criar')">Criar conta</button>
        </div>
        <div class="field"><label>Nome</label><input type="text" id="loginNome" placeholder="seu nome completo"></div>
        <div class="field"><label>Senha</label><input type="password" id="loginSenha" placeholder="senha"></div>
        ${state.authMode==='criar' ? `
        <div class="field"><label>Perfil de acesso</label>
          <select id="loginPapel">
            <option value="professor">Professor(a) — minhas turmas</option>
            <option value="coordenacao">Coordenação / Direção — todas as turmas</option>
          </select>
        </div>` : ''}
        ${state.msg ? `<div class="error">${state.msg}</div>` : ''}
        <button class="primary" style="width:100%;" onclick="doAuth()">${state.authMode==='entrar'?'Entrar':'Criar conta'}</button>
      </div>
      <footer class="note" style="color:#9FACC0;border-color:#3A4A66;">Protótipo funcional — login simplificado para fins de demonstração. Para uso real da escola, recomenda-se autenticação segura no backend.</footer>
    </div>
  </div>`;
}
function setAuthMode(m){ state.authMode = m; state.msg=null; render(); }
function attachLogin(){}
async function doAuth(){
  const nome = document.getElementById('loginNome').value.trim();
  const senha = document.getElementById('loginSenha').value;
  if(!nome || !senha){ state.msg = 'Preencha nome e senha.'; render(); return; }
  if(state.authMode==='criar'){
    if(db.professores.some(p => p.nome.toLowerCase()===nome.toLowerCase())){
      state.msg = 'Já existe um professor com esse nome. Escolha "Entrar".'; render(); return;
    }
    const papel = document.getElementById('loginPapel').value;
    const novo = { id: genId('prof'), nome, senha, papel };
    db.professores.push(novo);
    await sSet('professores', db.professores, true);
    state.user = novo;
  } else {
    const p = db.professores.find(p => p.nome.toLowerCase()===nome.toLowerCase() && p.senha===senha);
    if(!p){ state.msg = 'Nome ou senha incorretos.'; render(); return; }
    state.user = p;
  }
  state.msg = null;
  state.view = 'turmas';
  render();
}
function doLogout(){ state.user=null; state.view='login'; state.msg=null; render(); }

// ---------- TURMAS ----------
function viewTurmas(){
  const minhas = minhasTurmas();
  const outras = outrasTurmas();
  return `
  <h1>${isCoordenacao() ? 'Todas as turmas da escola' : 'Minhas turmas'}</h1>
  <p class="sub">${isCoordenacao() ? 'Como coordenação/direção, você tem acesso a todas as turmas cadastradas na escola.' : 'Selecione uma turma para lançar conteúdo, chamada, notas e ver o consolidado.'}</p>

  ${minhas.length ? minhas.map(t => `
    <div class="list-item" onclick="abrirTurma('${t.id}')">
      <div>
        <b>${t.nome}</b>
        <div class="meta">${t.alunos.length} aluno(s) · ${t.periodoTipo==='bimestre'?'Bimestral':'Trimestral'} · nota por ${t.sistemaNota==='media'?'média':'soma direta'} · ${t.professorIds.length} professor(es) vinculado(s)</div>
      </div>
      <span class="stamp navy">abrir</span>
    </div>`).join('') : `<div class="empty">${isCoordenacao() ? 'Nenhuma turma cadastrada na escola ainda.' : 'Você ainda não está vinculado a nenhuma turma.'}</div>`}

  <div style="margin:22px 0 10px;">
    ${state.novaTurmaAberta ? '' : '<button class="primary" onclick="toggleNovaTurma()">+ Criar nova turma</button>'}
  </div>

  ${state.novaTurmaAberta ? `
  <div class="card">
    <h3>Nova turma</h3>
    <div class="field"><label>Nome da turma</label><input type="text" id="ntNome" placeholder="ex: 7º Ano B — Matemática"></div>
    <div class="row">
      <div class="field">
        <label>Período letivo</label>
        <select id="ntPeriodo"><option value="bimestre">Bimestral (4 bimestres)</option><option value="trimestre">Trimestral (3 trimestres)</option></select>
      </div>
      <div class="field">
        <label>Sistema de nota</label>
        <select id="ntSistema"><option value="media">Média das avaliações</option><option value="soma">Soma direta (contagem)</option></select>
      </div>
    </div>
    <button class="primary" onclick="criarTurma()">Criar turma</button>
    <button class="ghost" onclick="toggleNovaTurma()" style="margin-left:8px;">Cancelar</button>
  </div>` : ''}

  ${outras.length ? `
  <h2 style="margin-top:30px;">Outras turmas da escola</h2>
  <p class="sub">Vincule-se a uma turma existente para lançar suas aulas nela.</p>
  ${outras.map(t => `
    <div class="list-item">
      <div><b>${t.nome}</b><div class="meta">${t.alunos.length} aluno(s) · ${t.professorIds.length} professor(es)</div></div>
      <button class="ghost" onclick="vincularTurma('${t.id}')">Vincular-me</button>
    </div>`).join('')}` : ''}
  `;
}
function attachTurmas(){}
function toggleNovaTurma(){ state.novaTurmaAberta = !state.novaTurmaAberta; render(); }
async function criarTurma(){
  const nome = document.getElementById('ntNome').value.trim();
  if(!nome) return;
  const periodoTipo = document.getElementById('ntPeriodo').value;
  const sistemaNota = document.getElementById('ntSistema').value;
  const turma = { id: genId('turma'), nome, periodoTipo, sistemaNota, professorIds:[state.user.id], alunos:[] };
  db.turmas.push(turma);
  await sSet('turmas', db.turmas, true);
  state.novaTurmaAberta = false;
  abrirTurma(turma.id);
}
async function vincularTurma(id){
  const t = getTurma(id);
  t.professorIds.push(state.user.id);
  await sSet('turmas', db.turmas, true);
  render();
}
async function abrirTurma(id){
  state.turmaAtualId = id;
  state.abaTurma = 'conteudo';
  await loadTurmaData(id);
  const t = getTurma(id);
  state.periodoAula = PERIODOS[t.periodoTipo][0];
  state.periodoAval = PERIODOS[t.periodoTipo][0];
  state.editandoAulaId = null;
  state.view = 'turma';
  render();
}

// ---------- TURMA DASHBOARD ----------
function viewTurma(){
  const t = getTurma(state.turmaAtualId);
  if(!t) return '<div class="empty">Turma não encontrada.</div>';
  return `
  <button class="link-small no-print" onclick="voltarTurmas()">← Minhas turmas</button>
  <h1 style="margin-top:10px;" class="no-print">${t.nome}</h1>
  <div class="badges no-print">
    <span class="stamp navy">${t.periodoTipo==='bimestre'?'bimestral':'trimestral'}</span>
    <span class="stamp gold">nota por ${t.sistemaNota==='media'?'média':'soma direta'}</span>
    <span class="stamp green">${t.alunos.length} aluno(s)</span>
  </div>
  <div class="tabs no-print">
    <button class="tab ${state.abaTurma==='conteudo'?'active':''}" onclick="mudarAba('conteudo')">Conteúdo &amp; Chamada</button>
    <button class="tab ${state.abaTurma==='avaliacoes'?'active':''}" onclick="mudarAba('avaliacoes')">Avaliações &amp; Recuperação</button>
    <button class="tab ${state.abaTurma==='consolidado'?'active':''}" onclick="mudarAba('consolidado')">Consolidado</button>
    <button class="tab ${state.abaTurma==='alunos'?'active':''}" onclick="mudarAba('alunos')">Alunos</button>
  </div>
  ${state.abaTurma==='conteudo' ? abaConteudo(t) : ''}
  ${state.abaTurma==='avaliacoes' ? abaAvaliacoes(t) : ''}
  ${state.abaTurma==='consolidado' ? abaConsolidado(t) : ''}
  ${state.abaTurma==='alunos' ? abaAlunos(t) : ''}
  `;
}
function attachTurma(){}
function voltarTurmas(){ state.view='turmas'; render(); }
function mudarAba(a){ state.abaTurma = a; state.editandoAulaId=null; render(); }

// ---- Conteúdo & Chamada ----
function abaConteudo(t){
  const aulas = cache.aulas[t.id] || [];
  const editId = state.editandoAulaId;
  const aulaAtual = editId ? aulas.find(a=>a.id===editId) : aulas.find(a=>a.data===state.dataAula);
  const conteudoVal = aulaAtual ? aulaAtual.conteudo : '';
  const temConteudo = aulaAtual && aulaAtual.conteudo && aulaAtual.conteudo.trim().length>0;

  let chamadaHtml = '<div class="locked">Lance o conteúdo da aula acima para liberar a chamada.</div>';
  if(temConteudo){
    chamadaHtml = `
    <h3 style="margin-top:22px;">Chamada</h3>
    ${t.alunos.length===0 ? '<div class="empty">Cadastre alunos na aba "Alunos" primeiro.</div>' : `
    <div class="card">
      ${t.alunos.map(al => {
        const presente = aulaAtual.chamada && aulaAtual.chamada[al.id]!==undefined ? aulaAtual.chamada[al.id]==='P' : true;
        return `<div class="checkline">
          <label>${al.nome}</label>
          <span class="presenca">
            <input type="checkbox" data-aluno="${al.id}" class="chk-presenca" ${presente?'checked':''}> presente
          </span>
        </div>`;
      }).join('')}
      <button class="primary" style="margin-top:14px;" onclick="salvarChamada('${aulaAtual.id}')">Salvar chamada</button>
    </div>`}
    `;
  }

  return `
  <div class="card ruled">
    <div class="row">
      <div class="field"><label>Data</label><input type="date" id="cDataAula" value="${editId ? aulaAtual.data : state.dataAula}" onchange="mudarDataAula(this.value)" ${editId?'disabled':''}></div>
      <div class="field"><label>Período</label>
        <select id="cPeriodoAula">${PERIODOS[t.periodoTipo].map(p => `<option ${((aulaAtual&&aulaAtual.periodo)||state.periodoAula)===p?'selected':''}>${p}</option>`).join('')}</select>
      </div>
    </div>
    <div class="field"><label>Conteúdo lecionado</label>
      <textarea id="cConteudo" placeholder="ex: Equações do 1º grau — resolução de exercícios do capítulo 3">${conteudoVal}</textarea>
    </div>
    <button class="primary" onclick="salvarConteudo()">Salvar conteúdo</button>
    ${editId ? `<button class="ghost" style="margin-left:8px;" onclick="cancelarEdicaoAula()">Nova aula</button>` : ''}
  </div>
  ${chamadaHtml}

  <h3 style="margin-top:28px;">Aulas lançadas</h3>
  ${aulas.length===0 ? '<div class="empty">Nenhuma aula lançada ainda.</div>' : `
  <table>
    <tr><th>Data</th><th>Período</th><th>Conteúdo</th><th>Chamada</th><th></th></tr>
    ${aulas.slice().sort((a,b)=>b.data.localeCompare(a.data)).map(a => `
      <tr>
        <td>${fmtData(a.data)}</td>
        <td>${a.periodo}</td>
        <td>${(a.conteudo||'').slice(0,50)}${a.conteudo && a.conteudo.length>50?'…':''}</td>
        <td>${a.chamada ? '<span class="stamp green" style="padding:3px 8px;font-size:9px;">feita</span>' : '<span class="stamp red" style="padding:3px 8px;font-size:9px;">pendente</span>'}</td>
        <td><button class="link-small" onclick="editarAula('${a.id}')">editar</button></td>
      </tr>`).join('')}
  </table>`}
  `;
}
function fmtData(iso){ const [y,m,d] = iso.split('-'); return `${d}/${m}/${y}`; }
function mudarDataAula(v){ state.dataAula = v; render(); }
function editarAula(id){ state.editandoAulaId = id; render(); }
function cancelarEdicaoAula(){ state.editandoAulaId = null; render(); }

async function salvarConteudo(){
  const t = getTurma(state.turmaAtualId);
  const conteudo = document.getElementById('cConteudo').value;
  const periodo = document.getElementById('cPeriodoAula').value;
  const data = document.getElementById('cDataAula').value;
  let aulas = cache.aulas[t.id];
  let aula = state.editandoAulaId ? aulas.find(a=>a.id===state.editandoAulaId) : aulas.find(a=>a.data===data);
  if(!aula){
    aula = { id: genId('aula'), data, periodo, conteudo, chamada:null };
    aulas.push(aula);
  } else {
    aula.conteudo = conteudo;
    aula.periodo = periodo;
  }
  await sSet('aulas_'+t.id, aulas, true);
  state.editandoAulaId = aula.id;
  render();
}
async function salvarChamada(aulaId){
  const t = getTurma(state.turmaAtualId);
  const aulas = cache.aulas[t.id];
  const aula = aulas.find(a=>a.id===aulaId);
  const chamada = {};
  document.querySelectorAll('.chk-presenca').forEach(chk => {
    chamada[chk.dataset.aluno] = chk.checked ? 'P' : 'F';
  });
  aula.chamada = chamada;
  await sSet('aulas_'+t.id, aulas, true);
  render();
}

// ---- Avaliações & Recuperação ----
function abaAvaliacoes(t){
  const notas = cache.notas[t.id];
  const periodo = state.periodoAval;
  if(!notas[periodo]) notas[periodo] = {};

  return `
  <div class="row" style="align-items:end;">
    <div class="field" style="max-width:260px;">
      <label>Período</label>
      <select onchange="mudarPeriodoAval(this.value)">
        ${PERIODOS[t.periodoTipo].map(p => `<option ${p===periodo?'selected':''}>${p}</option>`).join('')}
      </select>
    </div>
    <div class="field" style="max-width:260px;">
      <label>Sistema de nota da turma</label>
      <select onchange="mudarSistemaNota(this.value)">
        <option value="media" ${t.sistemaNota==='media'?'selected':''}>Média das avaliações</option>
        <option value="soma" ${t.sistemaNota==='soma'?'selected':''}>Soma direta</option>
      </select>
    </div>
  </div>
  ${t.alunos.length===0 ? '<div class="empty">Cadastre alunos na aba "Alunos" primeiro.</div>' : `
  <div class="card" style="overflow-x:auto;">
    <table>
      <tr>
        <th rowspan="2" style="vertical-align:bottom;">Aluno</th>
        ${[1,2,3,4].map(i=>`<th colspan="2" style="text-align:center;">Avaliação ${i}</th>`).join('')}
        <th rowspan="2" style="vertical-align:bottom;">Nota final</th>
      </tr>
      <tr>${[1,2,3,4].map(()=>`<th style="text-align:center;">nota</th><th style="text-align:center;">recup.</th>`).join('')}</tr>
      ${t.alunos.map(al => {
        const reg = notas[periodo][al.id] || { av:[null,null,null,null], rec:[null,null,null,null] };
        const final = calcNotaFinal(t.sistemaNota, reg.av, reg.rec);
        return `<tr>
          <td>${al.nome}</td>
          ${[0,1,2,3].map(i => `
            <td><input type="number" min="0" max="10" step="0.1" class="nota-av" data-aluno="${al.id}" data-idx="${i}" value="${reg.av[i]??''}" onchange="atualizarNota()"></td>
            <td><input type="number" min="0" max="10" step="0.1" class="nota-rec" data-aluno="${al.id}" data-idx="${i}" value="${reg.rec[i]??''}" onchange="atualizarNota()"></td>
          `).join('')}
          <td class="num-final ${final!==null && final<6?'final-baixa':final!==null?'final-alta':''}" id="final-${al.id}">${fmtNota(final)}</td>
        </tr>`;
      }).join('')}
    </table>
    <button class="primary" style="margin-top:16px;" onclick="salvarNotas()">Salvar notas</button>
    <span id="notaMsg" class="ok" style="margin-left:10px;"></span>
  </div>`}
  `;
}
function mudarPeriodoAval(p){ state.periodoAval = p; render(); }
async function mudarSistemaNota(v){
  const t = getTurma(state.turmaAtualId);
  t.sistemaNota = v;
  await sSet('turmas', db.turmas, true);
  render();
}
function atualizarNota(){
  const t = getTurma(state.turmaAtualId);
  document.querySelectorAll('.nota-av').forEach(inp => {
    const alunoId = inp.dataset.aluno;
    const av = [0,1,2,3].map(i => { const e = document.querySelector(`.nota-av[data-aluno="${alunoId}"][data-idx="${i}"]`); return e.value; });
    const rec = [0,1,2,3].map(i => { const e = document.querySelector(`.nota-rec[data-aluno="${alunoId}"][data-idx="${i}"]`); return e.value; });
    const final = calcNotaFinal(t.sistemaNota, av, rec);
    const cell = document.getElementById('final-'+alunoId);
    if(cell){ cell.textContent = fmtNota(final); cell.className = 'num-final ' + (final!==null && final<6?'final-baixa':final!==null?'final-alta':''); }
  });
}
async function salvarNotas(){
  const t = getTurma(state.turmaAtualId);
  const notas = cache.notas[t.id];
  const periodo = state.periodoAval;
  if(!notas[periodo]) notas[periodo] = {};
  t.alunos.forEach(al => {
    const av = [0,1,2,3].map(i => { const e = document.querySelector(`.nota-av[data-aluno="${al.id}"][data-idx="${i}"]`); return e.value===''? null : e.value; });
    const rec = [0,1,2,3].map(i => { const e = document.querySelector(`.nota-rec[data-aluno="${al.id}"][data-idx="${i}"]`); return e.value===''? null : e.value; });
    notas[periodo][al.id] = { av, rec };
  });
  await sSet('notas_'+t.id, notas, true);
  document.getElementById('notaMsg').textContent = 'Notas salvas.';
  setTimeout(()=>{ const m=document.getElementById('notaMsg'); if(m) m.textContent=''; }, 2500);
}

// ---- Consolidado ----
function abaConsolidado(t){
  const notas = cache.notas[t.id];
  const aulas = cache.aulas[t.id] || [];
  const periodos = PERIODOS[t.periodoTipo];

  if(t.alunos.length===0) return '<div class="empty">Cadastre alunos na aba "Alunos" primeiro.</div>';

  function faltasNoPeriodo(alunoId, periodo){
    const aulasDoPeriodo = aulas.filter(a => a.periodo===periodo && a.chamada);
    const faltas = aulasDoPeriodo.filter(a => a.chamada[alunoId]==='F').length;
    return { faltas, total: aulasDoPeriodo.length };
  }

  return `
  <div class="print-header">
    <div class="esc">${SCHOOL_NAME}</div>
    <h1>Consolidado de notas e faltas — ${t.nome}</h1>
    <div class="meta">${t.periodoTipo==='bimestre'?'Sistema bimestral':'Sistema trimestral'} · nota por ${t.sistemaNota==='media'?'média':'soma direta'} · emitido em ${new Date().toLocaleDateString('pt-BR')}</div>
  </div>
  <div class="no-print" style="margin-bottom:14px;">
    <button class="ghost" onclick="imprimirConsolidado()">🖨️ Imprimir / exportar PDF</button>
  </div>
  <div class="card" style="overflow-x:auto;">
    <table>
      <tr>
        <th>Aluno</th>
        ${periodos.map(p=>`<th style="text-align:center;">${p}<br><span style="font-weight:400;">nota / faltas</span></th>`).join('')}
        <th style="text-align:center;">Média geral</th>
        <th style="text-align:center;">Total faltas</th>
      </tr>
      ${t.alunos.map(al => {
        const notasPeriodo = periodos.map(p => {
          const reg = (notas[p] && notas[p][al.id]) || null;
          return reg ? calcNotaFinal(t.sistemaNota, reg.av, reg.rec) : null;
        });
        const faltasInfo = periodos.map(p => faltasNoPeriodo(al.id, p));
        const validas = notasPeriodo.filter(n => n!==null);
        const mediaGeral = validas.length ? validas.reduce((a,b)=>a+b,0)/validas.length : null;
        const totalFaltas = faltasInfo.reduce((a,f)=>a+f.faltas,0);
        return `<tr>
          <td>${al.nome}</td>
          ${periodos.map((p,i) => `<td style="text-align:center;">${fmtNota(notasPeriodo[i])} / ${faltasInfo[i].faltas}</td>`).join('')}
          <td style="text-align:center;" class="num-final ${mediaGeral!==null && mediaGeral<6?'final-baixa':mediaGeral!==null?'final-alta':''}">${fmtNota(mediaGeral)}</td>
          <td style="text-align:center;">${totalFaltas}</td>
        </tr>`;
      }).join('')}
    </table>
  </div>
  <p class="sub no-print">Faltas contabilizadas apenas nas aulas em que a chamada foi salva. Nota final de cada período considera a recuperação quando ela é maior que a nota original.</p>
  `;
}
function imprimirConsolidado(){ window.print(); }

// ---- Alunos ----
function abaAlunos(t){
  return `
  <div class="card">
    <h3>Adicionar alunos</h3>
    <p class="sub">Cole a lista oficial, um aluno por linha. Formato opcional: <code>Nome, matrícula</code></p>
    <textarea id="alunosBulk" placeholder="Ana Paula Souza, 20261045
Bruno Costa Lima, 20261046
Carla Menezes"></textarea>
    <button class="primary" style="margin-top:10px;" onclick="adicionarAlunos()">Adicionar à turma</button>
    <span id="alunoMsg" class="ok"></span>
  </div>
  <h3>Alunos matriculados (${t.alunos.length})</h3>
  ${t.alunos.length===0 ? '<div class="empty">Nenhum aluno cadastrado ainda.</div>' : `
  <table>
    <tr><th>Nome</th><th>Matrícula</th><th></th></tr>
    ${t.alunos.slice().sort((a,b)=>a.nome.localeCompare(b.nome)).map(al => `
      <tr><td>${al.nome}</td><td>${al.matricula||'—'}</td><td><button class="danger" onclick="removerAluno('${al.id}')" title="Remover">×</button></td></tr>
    `).join('')}
  </table>`}
  `;
}
async function adicionarAlunos(){
  const t = getTurma(state.turmaAtualId);
  const raw = document.getElementById('alunosBulk').value;
  const linhas = raw.split('\n').map(l=>l.trim()).filter(Boolean);
  let adicionados = 0;
  linhas.forEach(linha => {
    const partes = linha.split(',').map(p=>p.trim());
    const nome = partes[0];
    const matricula = partes[1] || '';
    if(!nome) return;
    const jaExiste = t.alunos.some(a => a.nome.toLowerCase()===nome.toLowerCase());
    if(jaExiste) return;
    t.alunos.push({ id: genId('al'), nome, matricula });
    adicionados++;
  });
  await sSet('turmas', db.turmas, true);
  document.getElementById('alunosBulk').value = '';
  const msg = document.getElementById('alunoMsg');
  if(msg) msg.textContent = adicionados + ' aluno(s) adicionado(s).';
  render();
}
async function removerAluno(id){
  const t = getTurma(state.turmaAtualId);
  t.alunos = t.alunos.filter(a => a.id!==id);
  await sSet('turmas', db.turmas, true);
  render();
}

init();
</script>
